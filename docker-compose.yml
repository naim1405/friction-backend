services:
  db:
    container_name: db
    image: mongo:7
    environment:
      MONGO_INITDB_DATABASE: test_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok", "mongodb://localhost:27017/admin"]
      interval: 10s
      timeout: 5s
      retries: 10

  server:
    container_name: server
    image: server
    build:
      context: ./
      dockerfile: Dockerfile
    env_file:
      - ./.env
    ports:
      - "5000:5000"
    volumes:
      - app_log:/app/logs
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped


volumes:
  mongo_data:
  app_log:
